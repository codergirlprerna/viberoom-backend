spring.application.name=backend

# Server
server.port=${PORT:8080}

# MySQL ? uses env vars in production, falls back to local for dev
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/viberoom?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:annie@26}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Firebase
firebase.service-account=classpath:firebase-service-account.json

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:your-local-key}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# WebSocket
spring.websocket.max-text-message-size=65536
